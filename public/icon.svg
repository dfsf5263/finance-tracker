<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Pie chart centred at 140,120, radius 100 -->

  <!-- Green segment: ~120° (top-right, income) -->
  <path d="M140,120 L140,20 A100,100 0 0,1 226.6,170 Z" fill="#4ade80"/>

  <!-- Blue segment: ~120° (bottom, savings) -->
  <path d="M140,120 L226.6,170 A100,100 0 0,1 53.4,170 Z" fill="#60a5fa"/>

  <!-- Orange/Red segment: ~120° (top-left, expenses) -->
  <path d="M140,120 L53.4,170 A100,100 0 0,1 140,20 Z" fill="#f97316"/>

  <!-- Coin circle bottom-left -->
  <circle cx="62" cy="194" r="38" fill="#facc15" stroke="#ca8a04" stroke-width="5"/>

  <!-- Dollar sign -->
  <text x="62" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#92400e">$</text>
</svg>
