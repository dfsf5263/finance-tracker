name: OWASP ZAP

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0' # Weekly — Sunday midnight UTC
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Baseline scan — runs on PRs and manual dispatch (fast, passive-only)
  # ---------------------------------------------------------------------------
  zap-baseline:
    name: OWASP ZAP Baseline Scan
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: finance_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/finance_tracker_test
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      APP_URL: http://localhost:3000
      ENABLE_ZAP_DISCOVERY: 'true'
      NEXT_PUBLIC_ENABLE_ZAP_DISCOVERY: 'true'
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Use npm 11
        run: npm install -g npm@11

      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:migrate:deploy
      - run: npm run db:seed

      - name: Build Next.js app
        run: npm run build

      - name: Start Next.js app
        run: npm start &

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "App ready" && exit 0
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "App did not become ready in time" && exit 1

      - name: Verify authenticated access
        run: |
          COOKIE=$(curl -s -D - -o /dev/null \
            -X POST http://localhost:3000/api/auth/sign-in/email \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"${E2E_EMAIL}\",\"password\":\"${E2E_PASSWORD}\"}" \
            | grep -i '^set-cookie:' | head -1 | sed 's/^[Ss]et-[Cc]ookie: //' | cut -d';' -f1)
          echo "Session cookie: ${COOKIE:0:20}..."
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -b "$COOKIE" http://localhost:3000/dashboard)
          echo "Dashboard status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Authenticated access failed — expected 200, got $STATUS"
            exit 1
          fi

      - name: Prepare ZAP context
        run: |
          ZAP_USER_NAME_B64=$(python3 -c "import base64; print(base64.b64encode(b'E2E User').decode())")
          ZAP_USERNAME_B64=$(python3 -c "import base64, os; print(base64.b64encode(os.environ['E2E_EMAIL'].encode()).decode())")
          ZAP_PASSWORD_B64=$(python3 -c "import base64, os; print(base64.b64encode(os.environ['E2E_PASSWORD'].encode()).decode())")
          ZAP_USER_ENCODED="0;true;${ZAP_USER_NAME_B64};5;${ZAP_USERNAME_B64}~${ZAP_PASSWORD_B64}~"
          sed -i "s|__ZAP_USER_ENCODED__|${ZAP_USER_ENCODED}|" .zap/finance-tracker.context

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:3000
          rules_file_name: .zap/rules.tsv
          cmd_options: '-n /zap/wrk/.zap/finance-tracker.context -U "E2E User" -j'
          fail_action: false
          artifact_name: zap-baseline-report

      - name: Upload ZAP log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: zap-baseline-log
          path: /home/runner/work/finance-tracker/finance-tracker/zap.log
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Full scan — runs on push to main and weekly schedule (thorough, active scan)
  # ---------------------------------------------------------------------------
  zap-full:
    name: OWASP ZAP Full Scan
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      issues: write

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: finance_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/finance_tracker_test
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      APP_URL: http://localhost:3000
      ENABLE_ZAP_DISCOVERY: 'true'
      NEXT_PUBLIC_ENABLE_ZAP_DISCOVERY: 'true'
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Use npm 11
        run: npm install -g npm@11

      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:migrate:deploy
      - run: npm run db:seed

      - name: Build Next.js app
        run: npm run build

      - name: Start Next.js app
        run: npm start &

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "App ready" && exit 0
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "App did not become ready in time" && exit 1

      - name: Verify authenticated access
        run: |
          COOKIE=$(curl -s -D - -o /dev/null \
            -X POST http://localhost:3000/api/auth/sign-in/email \
            -H 'Content-Type: application/json' \
            -d "{\"email\":\"${E2E_EMAIL}\",\"password\":\"${E2E_PASSWORD}\"}" \
            | grep -i '^set-cookie:' | head -1 | sed 's/^[Ss]et-[Cc]ookie: //' | cut -d';' -f1)
          echo "Session cookie: ${COOKIE:0:20}..."
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -b "$COOKIE" http://localhost:3000/dashboard)
          echo "Dashboard status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Authenticated access failed — expected 200, got $STATUS"
            exit 1
          fi

      - name: Prepare ZAP context
        run: |
          ZAP_USER_NAME_B64=$(python3 -c "import base64; print(base64.b64encode(b'E2E User').decode())")
          ZAP_USERNAME_B64=$(python3 -c "import base64, os; print(base64.b64encode(os.environ['E2E_EMAIL'].encode()).decode())")
          ZAP_PASSWORD_B64=$(python3 -c "import base64, os; print(base64.b64encode(os.environ['E2E_PASSWORD'].encode()).decode())")
          ZAP_USER_ENCODED="0;true;${ZAP_USER_NAME_B64};5;${ZAP_USERNAME_B64}~${ZAP_PASSWORD_B64}~"
          sed -i "s|__ZAP_USER_ENCODED__|${ZAP_USER_ENCODED}|" .zap/finance-tracker.context

      - name: Run OWASP ZAP full scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          target: http://localhost:3000
          rules_file_name: .zap/rules.tsv
          cmd_options: '-n /zap/wrk/.zap/finance-tracker.context -U "E2E User" -m 30 -j'
          fail_action: false
          artifact_name: zap-full-report

      - name: Upload ZAP log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: zap-full-log
          path: /home/runner/work/finance-tracker/finance-tracker/zap.log
          if-no-files-found: ignore
