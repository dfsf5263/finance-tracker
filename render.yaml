databases:
  - name: finance-tracker-db
    plan: basic-256mb
    postgresMajorVersion: "17"
    databaseName: finance_tracker
    user: finance_tracker

services:
  - type: web
    name: finance-tracker
    runtime: image
    image:
      url: ghcr.io/dfsf5263/finance-tracker:latest
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-tracker-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_REPLY_TO_EMAIL
        sync: false
