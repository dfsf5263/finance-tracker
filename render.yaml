databases:
  - name: finance-tracker-db
    plan: free
    databaseName: finance_tracker
    user: finance_tracker

services:
  - type: web
    name: finance-tracker
    runtime: docker
    repo: https://github.com/dfsf5263/finance-tracker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-tracker-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_REPLY_TO_EMAIL
        sync: false
